services:
  api:
    build: ./api
    ports:
      - "3001:3001"
    volumes:
      - api-data:/app/data
    environment:
      - PORT=3001
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://api:3001
    depends_on:
      api:
        condition: service_healthy

  docs:
    build:
      context: .
      dockerfile: docs/Dockerfile
    ports:
      - "3003:3003"

  mcp-server:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    ports:
      - "3002:3002"
    environment:
      - BANNEROS_API_URL=http://api:3001
      - MCP_PORT=3002
    depends_on:
      api:
        condition: service_healthy

volumes:
  api-data:
